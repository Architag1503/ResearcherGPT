services:
  mongodb:
    image: mongo:6.0
    container_name: research_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - research_network

  redis:
    image: redis:7.0-alpine
    container_name: research_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - research_network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: research_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - research_network

  neo4j:
    image: neo4j:5.12-community
    container_name: research_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/research_password_123
    volumes:
      - neo4j_data:/data
    networks:
      - research_network

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: research_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      # Use the Docker-internal MongoDB container (not Atlas) when running in Docker
      - MONGO_URI=mongodb://mongodb:27017/researcher_gpt
      - REDIS_URL=redis://redis:6379
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=${JWT_SECRET}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - NODE_ENV=development
      - OPENALEX_API_KEY=${OPENALEX_API_KEY}
      - FORMATEX_API_KEY=${FORMATEX_API_KEY}
      # DISABLE_QUEUE is NOT set here — Docker Redis 7.0 is fully compatible with BullMQ
    volumes:
      - uploads_data:/usr/src/app/uploads
    depends_on:
      - mongodb
      - redis
    networks:
      - research_network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: research_ai_service
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=research_password_123
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - SAMBANOVA_API_KEY=${SAMBANOVA_API_KEY}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - CEREBRAS_API_KEY=${CEREBRAS_API_KEY}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - REDIS_URL=redis://redis:6379
      - EXPRESS_API_URL=http://server:5000
      - FORMATEX_API_KEY=${FORMATEX_API_KEY}
    volumes:
      - uploads_data:/usr/src/app/uploads
    depends_on:
      - qdrant
      - neo4j
      - redis
    networks:
      - research_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: research_client
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
    depends_on:
      - server
    networks:
      - research_network

networks:
  research_network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  qdrant_data:
  neo4j_data:
  uploads_data:
